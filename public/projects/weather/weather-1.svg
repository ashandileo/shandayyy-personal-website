<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450">
  <defs>
    <filter id="shadow6" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#7dd3fc"/>
    </linearGradient>
  </defs>
  <!-- Browser chrome -->
  <rect width="800" height="450" rx="10" fill="#f0f9ff"/>
  <rect width="800" height="36" rx="10" fill="#e5e7eb"/>
  <rect x="0" y="20" width="800" height="16" fill="#e5e7eb"/>
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <rect x="120" y="10" width="560" height="16" rx="8" fill="#ffffff"/>
  <rect x="135" y="15" width="130" height="6" rx="3" fill="#d1d5db"/>
  <!-- Left Panel: Current Weather -->
  <rect x="20" y="50" width="320" height="220" rx="12" fill="url(#skyGrad)" filter="url(#shadow6)"/>
  <!-- Sun icon -->
  <circle cx="90" cy="120" r="32" fill="#fbbf24"/>
  <circle cx="90" cy="120" r="24" fill="#fcd34d"/>
  <!-- Sun rays -->
  <line x1="90" y1="76" x2="90" y2="66" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
  <line x1="90" y1="164" x2="90" y2="174" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
  <line x1="46" y1="120" x2="36" y2="120" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
  <line x1="134" y1="120" x2="144" y2="120" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
  <line x1="59" y1="89" x2="52" y2="82" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
  <line x1="121" y1="151" x2="128" y2="158" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
  <line x1="59" y1="151" x2="52" y2="158" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
  <line x1="121" y1="89" x2="128" y2="82" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
  <!-- Temperature -->
  <text x="180" y="110" font-family="system-ui" font-size="48" font-weight="700" fill="#ffffff">24°C</text>
  <text x="180" y="134" font-family="system-ui" font-size="14" fill="#e0f2fe">Sunny</text>
  <!-- Location -->
  <text x="40" y="200" font-family="system-ui" font-size="16" font-weight="600" fill="#ffffff">San Francisco, CA</text>
  <text x="40" y="220" font-family="system-ui" font-size="11" fill="#bae6fd">Feels like 22°C  |  Humidity 45%</text>
  <!-- Min/Max -->
  <text x="40" y="252" font-family="system-ui" font-size="12" fill="#e0f2fe">H: 27°  L: 18°</text>

  <!-- Right Panel: Hourly Bar Chart -->
  <rect x="360" y="50" width="420" height="220" rx="12" fill="#ffffff" filter="url(#shadow6)"/>
  <text x="380" y="76" font-family="system-ui" font-size="13" font-weight="700" fill="#1f2937">Hourly Forecast</text>
  <!-- Chart bars -->
  <!-- Bar 1: 9AM -->
  <rect x="400" y="140" width="40" height="90" rx="4" fill="#bae6fd"/>
  <text x="412" y="132" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#0284c7">20°</text>
  <text x="420" y="248" text-anchor="middle" font-family="system-ui" font-size="10" fill="#6b7280">9AM</text>
  <!-- Bar 2: 12PM -->
  <rect x="460" y="108" width="40" height="122" rx="4" fill="#7dd3fc"/>
  <text x="472" y="100" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#0284c7">24°</text>
  <text x="480" y="248" text-anchor="middle" font-family="system-ui" font-size="10" fill="#6b7280">12PM</text>
  <!-- Bar 3: 3PM -->
  <rect x="520" y="96" width="40" height="134" rx="4" fill="#38bdf8"/>
  <text x="532" y="88" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#0284c7">27°</text>
  <text x="540" y="248" text-anchor="middle" font-family="system-ui" font-size="10" fill="#6b7280">3PM</text>
  <!-- Bar 4: 6PM -->
  <rect x="580" y="116" width="40" height="114" rx="4" fill="#7dd3fc"/>
  <text x="592" y="108" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#0284c7">23°</text>
  <text x="600" y="248" text-anchor="middle" font-family="system-ui" font-size="10" fill="#6b7280">6PM</text>
  <!-- Bar 5: 9PM -->
  <rect x="640" y="148" width="40" height="82" rx="4" fill="#bae6fd"/>
  <text x="652" y="140" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#0284c7">19°</text>
  <text x="660" y="248" text-anchor="middle" font-family="system-ui" font-size="10" fill="#6b7280">9PM</text>
  <!-- Bar 6: 12AM -->
  <rect x="700" y="160" width="40" height="70" rx="4" fill="#e0f2fe"/>
  <text x="712" y="152" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#0284c7">17°</text>
  <text x="720" y="248" text-anchor="middle" font-family="system-ui" font-size="10" fill="#6b7280">12AM</text>
  <!-- Baseline -->
  <line x1="390" y1="230" x2="750" y2="230" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Bottom: 5-Day Forecast -->
  <rect x="20" y="286" width="760" height="150" rx="12" fill="#ffffff" filter="url(#shadow6)"/>
  <text x="40" y="312" font-family="system-ui" font-size="13" font-weight="700" fill="#1f2937">5-Day Forecast</text>
  <!-- Day 1: Mon -->
  <rect x="40" y="326" width="136" height="96" rx="8" fill="#f0f9ff"/>
  <text x="108" y="348" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#374151">Mon</text>
  <!-- Sun icon mini -->
  <circle cx="108" cy="374" r="14" fill="#fbbf24"/>
  <circle cx="108" cy="374" r="10" fill="#fcd34d"/>
  <text x="108" y="408" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#1f2937">25°</text>
  <!-- Day 2: Tue -->
  <rect x="188" y="326" width="136" height="96" rx="8" fill="#f0f9ff"/>
  <text x="256" y="348" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#374151">Tue</text>
  <!-- Cloud icon mini -->
  <circle cx="248" cy="370" r="10" fill="#cbd5e1"/>
  <circle cx="262" cy="374" r="12" fill="#e2e8f0"/>
  <text x="256" y="408" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#1f2937">22°</text>
  <!-- Day 3: Wed -->
  <rect x="336" y="326" width="136" height="96" rx="8" fill="#f0f9ff"/>
  <text x="404" y="348" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#374151">Wed</text>
  <!-- Rain icon -->
  <circle cx="396" cy="370" r="10" fill="#cbd5e1"/>
  <circle cx="410" cy="374" r="12" fill="#94a3b8"/>
  <line x1="398" y1="388" x2="396" y2="394" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
  <line x1="408" y1="388" x2="406" y2="394" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
  <text x="404" y="408" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#1f2937">18°</text>
  <!-- Day 4: Thu -->
  <rect x="484" y="326" width="136" height="96" rx="8" fill="#f0f9ff"/>
  <text x="552" y="348" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#374151">Thu</text>
  <!-- Part cloudy -->
  <circle cx="544" cy="370" r="12" fill="#fbbf24"/>
  <circle cx="556" cy="376" r="10" fill="#e2e8f0"/>
  <text x="552" y="408" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#1f2937">21°</text>
  <!-- Day 5: Fri -->
  <rect x="632" y="326" width="136" height="96" rx="8" fill="#f0f9ff"/>
  <text x="700" y="348" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#374151">Fri</text>
  <circle cx="700" cy="374" r="14" fill="#fbbf24"/>
  <circle cx="700" cy="374" r="10" fill="#fcd34d"/>
  <text x="700" y="408" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#1f2937">26°</text>
</svg>