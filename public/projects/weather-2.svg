<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450">
  <defs>
    <filter id="shadow7" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="chartFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="humidGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="windGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="uvGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="pressGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Browser chrome -->
  <rect width="800" height="450" rx="10" fill="#f0f9ff"/>
  <rect width="800" height="36" rx="10" fill="#e5e7eb"/>
  <rect x="0" y="20" width="800" height="16" fill="#e5e7eb"/>
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <rect x="120" y="10" width="560" height="16" rx="8" fill="#ffffff"/>
  <rect x="135" y="15" width="130" height="6" rx="3" fill="#d1d5db"/>
  <!-- Header -->
  <text x="40" y="66" font-family="system-ui" font-size="15" font-weight="700" fill="#1f2937">Temperature - 24 Hours</text>
  <rect x="640" y="50" width="60" height="24" rx="6" fill="#dbeafe"/>
  <text x="652" y="66" font-family="system-ui" font-size="10" fill="#2563eb">Today</text>
  <rect x="710" y="50" width="70" height="24" rx="6" fill="#f3f4f6"/>
  <text x="722" y="66" font-family="system-ui" font-size="10" fill="#6b7280">Week</text>

  <!-- Area chart -->
  <rect x="20" y="80" width="760" height="190" rx="10" fill="#ffffff" filter="url(#shadow7)"/>
  <!-- Grid lines -->
  <line x1="60" y1="100" x2="760" y2="100" stroke="#f3f4f6" stroke-width="1"/>
  <line x1="60" y1="130" x2="760" y2="130" stroke="#f3f4f6" stroke-width="1"/>
  <line x1="60" y1="160" x2="760" y2="160" stroke="#f3f4f6" stroke-width="1"/>
  <line x1="60" y1="190" x2="760" y2="190" stroke="#f3f4f6" stroke-width="1"/>
  <line x1="60" y1="220" x2="760" y2="220" stroke="#f3f4f6" stroke-width="1"/>
  <!-- Y axis labels -->
  <text x="36" y="104" font-family="system-ui" font-size="9" fill="#9ca3af">30°</text>
  <text x="36" y="134" font-family="system-ui" font-size="9" fill="#9ca3af">25°</text>
  <text x="36" y="164" font-family="system-ui" font-size="9" fill="#9ca3af">20°</text>
  <text x="36" y="194" font-family="system-ui" font-size="9" fill="#9ca3af">15°</text>
  <text x="36" y="224" font-family="system-ui" font-size="9" fill="#9ca3af">10°</text>
  <!-- X axis labels -->
  <text x="80" y="248" font-family="system-ui" font-size="9" fill="#9ca3af">12AM</text>
  <text x="170" y="248" font-family="system-ui" font-size="9" fill="#9ca3af">4AM</text>
  <text x="260" y="248" font-family="system-ui" font-size="9" fill="#9ca3af">8AM</text>
  <text x="350" y="248" font-family="system-ui" font-size="9" fill="#9ca3af">12PM</text>
  <text x="440" y="248" font-family="system-ui" font-size="9" fill="#9ca3af">4PM</text>
  <text x="530" y="248" font-family="system-ui" font-size="9" fill="#9ca3af">8PM</text>
  <text x="620" y="248" font-family="system-ui" font-size="9" fill="#9ca3af">12AM</text>
  <!-- Area fill -->
  <polygon points="80,200 140,210 200,205 260,185 320,160 380,135 440,118 500,112 560,120 620,140 680,165 740,188 740,230 80,230" fill="url(#chartFill)"/>
  <!-- Line -->
  <polyline points="80,200 140,210 200,205 260,185 320,160 380,135 440,118 500,112 560,120 620,140 680,165 740,188" stroke="#3b82f6" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Data points -->
  <circle cx="80" cy="200" r="3" fill="#3b82f6"/>
  <circle cx="140" cy="210" r="3" fill="#3b82f6"/>
  <circle cx="200" cy="205" r="3" fill="#3b82f6"/>
  <circle cx="260" cy="185" r="3" fill="#3b82f6"/>
  <circle cx="320" cy="160" r="3" fill="#3b82f6"/>
  <circle cx="380" cy="135" r="3" fill="#3b82f6"/>
  <circle cx="440" cy="118" r="3" fill="#3b82f6"/>
  <circle cx="500" cy="112" r="4" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="560" cy="120" r="3" fill="#3b82f6"/>
  <circle cx="620" cy="140" r="3" fill="#3b82f6"/>
  <circle cx="680" cy="165" r="3" fill="#3b82f6"/>
  <circle cx="740" cy="188" r="3" fill="#3b82f6"/>
  <!-- Tooltip on peak -->
  <rect x="472" y="88" width="56" height="22" rx="6" fill="#1e293b"/>
  <text x="500" y="103" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="600" fill="#ffffff">27°C</text>

  <!-- Stat cards grid -->
  <!-- Card 1: Humidity -->
  <rect x="20" y="286" width="180" height="150" rx="10" fill="#ffffff" filter="url(#shadow7)"/>
  <circle cx="56" cy="318" r="20" fill="#dbeafe"/>
  <!-- Droplet icon -->
  <ellipse cx="56" cy="320" rx="8" ry="10" fill="url(#humidGrad)"/>
  <text x="88" y="314" font-family="system-ui" font-size="11" font-weight="600" fill="#6b7280">Humidity</text>
  <text x="88" y="334" font-family="system-ui" font-size="22" font-weight="700" fill="#1f2937">45%</text>
  <!-- Mini bar -->
  <rect x="36" y="356" width="148" height="6" rx="3" fill="#e5e7eb"/>
  <rect x="36" y="356" width="67" height="6" rx="3" fill="#3b82f6"/>
  <text x="36" y="382" font-family="system-ui" font-size="10" fill="#9ca3af">Normal range</text>
  <rect x="36" y="392" width="80" height="6" rx="3" fill="#d1d5db"/>
  <rect x="36" y="406" width="110" height="6" rx="3" fill="#e5e7eb"/>

  <!-- Card 2: Wind -->
  <rect x="212" y="286" width="180" height="150" rx="10" fill="#ffffff" filter="url(#shadow7)"/>
  <circle cx="248" cy="318" r="20" fill="#d1fae5"/>
  <!-- Wind lines -->
  <line x1="238" y1="314" x2="258" y2="314" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
  <line x1="240" y1="320" x2="256" y2="320" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
  <line x1="242" y1="326" x2="254" y2="326" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
  <text x="280" y="314" font-family="system-ui" font-size="11" font-weight="600" fill="#6b7280">Wind Speed</text>
  <text x="280" y="334" font-family="system-ui" font-size="22" font-weight="700" fill="#1f2937">12</text>
  <text x="310" y="334" font-family="system-ui" font-size="12" fill="#9ca3af">km/h</text>
  <text x="228" y="370" font-family="system-ui" font-size="10" fill="#9ca3af">Direction: NW</text>
  <!-- Compass mini -->
  <circle cx="248" cy="400" r="16" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="248" y1="400" x2="240" y2="390" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
  <circle cx="248" cy="400" r="2" fill="#10b981"/>
  <rect x="280" y="392" width="90" height="6" rx="3" fill="#d1d5db"/>
  <rect x="280" y="406" width="70" height="6" rx="3" fill="#e5e7eb"/>

  <!-- Card 3: UV Index -->
  <rect x="404" y="286" width="180" height="150" rx="10" fill="#ffffff" filter="url(#shadow7)"/>
  <circle cx="440" cy="318" r="20" fill="#fef3c7"/>
  <!-- Sun mini icon -->
  <circle cx="440" cy="318" r="10" fill="url(#uvGrad)"/>
  <text x="472" y="314" font-family="system-ui" font-size="11" font-weight="600" fill="#6b7280">UV Index</text>
  <text x="472" y="334" font-family="system-ui" font-size="22" font-weight="700" fill="#1f2937">6</text>
  <rect x="498" y="324" width="44" height="16" rx="4" fill="#fef3c7"/>
  <text x="506" y="336" font-family="system-ui" font-size="9" fill="#d97706">High</text>
  <!-- UV scale -->
  <rect x="420" y="358" width="148" height="8" rx="4" fill="#e5e7eb"/>
  <rect x="420" y="358" width="30" height="8" rx="4" fill="#22c55e"/>
  <rect x="450" y="358" width="30" height="8" fill="#84cc16"/>
  <rect x="480" y="358" width="30" height="8" fill="#eab308"/>
  <rect x="510" y="358" width="28" height="8" fill="#f97316"/>
  <rect x="538" y="358" width="30" height="8" rx="4" fill="#ef4444"/>
  <!-- Marker -->
  <rect x="504" y="354" width="3" height="16" rx="1" fill="#1f2937"/>
  <text x="420" y="386" font-family="system-ui" font-size="10" fill="#9ca3af">Protection needed</text>
  <rect x="420" y="396" width="120" height="6" rx="3" fill="#d1d5db"/>
  <rect x="420" y="410" width="80" height="6" rx="3" fill="#e5e7eb"/>

  <!-- Card 4: Pressure -->
  <rect x="596" y="286" width="184" height="150" rx="10" fill="#ffffff" filter="url(#shadow7)"/>
  <circle cx="632" cy="318" r="20" fill="#ede9fe"/>
  <!-- Gauge icon -->
  <circle cx="632" cy="318" r="10" fill="none" stroke="url(#pressGrad)" stroke-width="3"/>
  <line x1="632" y1="318" x2="638" y2="312" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round"/>
  <text x="664" y="314" font-family="system-ui" font-size="11" font-weight="600" fill="#6b7280">Pressure</text>
  <text x="664" y="334" font-family="system-ui" font-size="20" font-weight="700" fill="#1f2937">1013</text>
  <text x="720" y="334" font-family="system-ui" font-size="10" fill="#9ca3af">hPa</text>
  <text x="612" y="370" font-family="system-ui" font-size="10" fill="#9ca3af">Trend: Stable</text>
  <!-- Mini trend line -->
  <polyline points="612,395 632,390 652,392 672,388 692,385 712,388 732,384 752,386" stroke="#8b5cf6" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <rect x="612" y="406" width="100" height="6" rx="3" fill="#d1d5db"/>
  <rect x="612" y="418" width="70" height="6" rx="3" fill="#e5e7eb"/>
</svg>