<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450">
  <defs>
    <filter id="shadow5" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="avatarGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
  </defs>
  <!-- Browser chrome -->
  <rect width="800" height="450" rx="10" fill="#ffffff"/>
  <rect width="800" height="36" rx="10" fill="#e5e7eb"/>
  <rect x="0" y="20" width="800" height="16" fill="#e5e7eb"/>
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <rect x="120" y="10" width="560" height="16" rx="8" fill="#ffffff"/>
  <rect x="135" y="15" width="110" height="6" rx="3" fill="#d1d5db"/>
  <!-- Nav bar -->
  <rect x="0" y="36" width="800" height="40" fill="#ffffff"/>
  <line x1="0" y1="76" x2="800" y2="76" stroke="#f3f4f6" stroke-width="1"/>
  <rect x="30" y="48" width="80" height="12" rx="4" fill="#1f2937"/>
  <rect x="540" y="50" width="40" height="8" rx="3" fill="#6b7280"/>
  <rect x="600" y="50" width="40" height="8" rx="3" fill="#6b7280"/>
  <rect x="660" y="50" width="50" height="8" rx="3" fill="#6b7280"/>
  <rect x="726" y="44" width="54" height="24" rx="12" fill="#14b8a6"/>
  <rect x="738" y="52" width="30" height="8" rx="3" fill="#ffffff"/>
  <!-- Hero section -->
  <!-- Avatar circle -->
  <circle cx="400" cy="130" r="36" fill="url(#avatarGrad)"/>
  <circle cx="400" cy="122" r="12" fill="#ffffff" opacity="0.4"/>
  <rect x="388" y="138" width="24" height="14" rx="7" fill="#ffffff" opacity="0.4"/>
  <!-- Hero text -->
  <text x="400" y="192" text-anchor="middle" font-family="system-ui" font-size="26" font-weight="800" fill="#1f2937">John Doe</text>
  <rect x="280" y="204" width="240" height="10" rx="4" fill="#9ca3af"/>
  <rect x="310" y="222" width="180" height="8" rx="3" fill="#d1d5db"/>
  <!-- CTA Buttons -->
  <rect x="290" y="246" width="110" height="36" rx="8" fill="#14b8a6"/>
  <text x="316" y="269" font-family="system-ui" font-size="12" font-weight="600" fill="#ffffff">View Work</text>
  <rect x="412" y="246" width="110" height="36" rx="8" fill="none" stroke="#14b8a6" stroke-width="2"/>
  <text x="432" y="269" font-family="system-ui" font-size="12" font-weight="600" fill="#14b8a6">Contact</text>
  <!-- Section title -->
  <text x="400" y="316" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="700" fill="#374151">Featured Projects</text>
  <rect x="370" y="322" width="60" height="3" rx="1" fill="#14b8a6"/>
  <!-- Project cards row -->
  <!-- Card 1 -->
  <rect x="60" y="338" width="210" height="100" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#shadow5)"/>
  <rect x="68" y="346" width="194" height="48" rx="6" fill="#ccfbf1"/>
  <rect x="110" y="358" width="110" height="24" rx="4" fill="#99f6e4"/>
  <rect x="68" y="404" width="120" height="8" rx="3" fill="#374151"/>
  <rect x="68" y="418" width="160" height="6" rx="3" fill="#d1d5db"/>
  <!-- Card 2 -->
  <rect x="290" y="338" width="210" height="100" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#shadow5)"/>
  <rect x="298" y="346" width="194" height="48" rx="6" fill="#f0fdfa"/>
  <rect x="340" y="358" width="110" height="24" rx="4" fill="#a7f3d0"/>
  <rect x="298" y="404" width="140" height="8" rx="3" fill="#374151"/>
  <rect x="298" y="418" width="170" height="6" rx="3" fill="#d1d5db"/>
  <!-- Card 3 -->
  <rect x="520" y="338" width="210" height="100" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#shadow5)"/>
  <rect x="528" y="346" width="194" height="48" rx="6" fill="#ecfdf5"/>
  <rect x="570" y="358" width="110" height="24" rx="4" fill="#6ee7b7"/>
  <rect x="528" y="404" width="130" height="8" rx="3" fill="#374151"/>
  <rect x="528" y="418" width="150" height="6" rx="3" fill="#d1d5db"/>
</svg>