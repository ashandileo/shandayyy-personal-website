<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450">
  <!-- Dark terminal background -->
  <rect width="800" height="450" rx="10" fill="#1e1e2e"/>
  <!-- Terminal chrome -->
  <rect width="800" height="36" rx="10" fill="#313244"/>
  <rect x="0" y="20" width="800" height="16" fill="#313244"/>
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <rect x="200" y="10" width="400" height="16" rx="8" fill="#45475a"/>
  <text x="340" y="22" text-anchor="middle" font-family="system-ui" font-size="10" fill="#a6adc8">portfolio-cli ~ bash</text>
  <!-- Terminal content -->
  <!-- Line 1: command -->
  <text x="24" y="60" font-family="monospace" font-size="13" fill="#a6e3a1">~/projects $</text>
  <text x="140" y="60" font-family="monospace" font-size="13" fill="#cdd6f4">npx create-portfolio --template modern</text>
  <!-- Line 2: status -->
  <text x="24" y="84" font-family="monospace" font-size="13" fill="#89dceb">info</text>
  <text x="60" y="84" font-family="monospace" font-size="13" fill="#a6adc8">Initializing portfolio generator v3.2.1...</text>
  <!-- Line 3 -->
  <text x="24" y="108" font-family="monospace" font-size="13" fill="#89dceb">info</text>
  <text x="60" y="108" font-family="monospace" font-size="13" fill="#a6adc8">Fetching template: modern-developer</text>
  <!-- Line 4: progress -->
  <text x="24" y="132" font-family="monospace" font-size="13" fill="#f9e2af">downloading</text>
  <text x="130" y="132" font-family="monospace" font-size="13" fill="#a6adc8">[</text>
  <!-- Progress bar -->
  <rect x="140" y="122" width="300" height="14" rx="2" fill="#45475a"/>
  <rect x="140" y="122" width="300" height="14" rx="2" fill="#a6e3a1"/>
  <text x="448" y="132" font-family="monospace" font-size="13" fill="#a6adc8">] 100%</text>
  <!-- Line 5 -->
  <text x="24" y="156" font-family="monospace" font-size="13" fill="#a6e3a1">&#x2713;</text>
  <text x="44" y="156" font-family="monospace" font-size="13" fill="#cdd6f4">Template downloaded successfully</text>
  <!-- Line 6 -->
  <text x="24" y="184" font-family="monospace" font-size="13" fill="#89dceb">info</text>
  <text x="60" y="184" font-family="monospace" font-size="13" fill="#a6adc8">Installing dependencies...</text>
  <!-- Line 7: packages -->
  <text x="24" y="208" font-family="monospace" font-size="13" fill="#cba6f7">added</text>
  <text x="78" y="208" font-family="monospace" font-size="13" fill="#cdd6f4">247 packages in 12.4s</text>
  <!-- Line 8 -->
  <text x="24" y="236" font-family="monospace" font-size="13" fill="#89dceb">info</text>
  <text x="60" y="236" font-family="monospace" font-size="13" fill="#a6adc8">Generating project structure...</text>
  <!-- File tree -->
  <text x="40" y="260" font-family="monospace" font-size="12" fill="#585b70">&#x251C;&#x2500;&#x2500;</text>
  <text x="76" y="260" font-family="monospace" font-size="12" fill="#89b4fa">src/</text>
  <text x="40" y="278" font-family="monospace" font-size="12" fill="#585b70">&#x2502;   &#x251C;&#x2500;&#x2500;</text>
  <text x="100" y="278" font-family="monospace" font-size="12" fill="#f9e2af">components/</text>
  <text x="40" y="296" font-family="monospace" font-size="12" fill="#585b70">&#x2502;   &#x251C;&#x2500;&#x2500;</text>
  <text x="100" y="296" font-family="monospace" font-size="12" fill="#f9e2af">pages/</text>
  <text x="40" y="314" font-family="monospace" font-size="12" fill="#585b70">&#x2502;   &#x2514;&#x2500;&#x2500;</text>
  <text x="100" y="314" font-family="monospace" font-size="12" fill="#f9e2af">styles/</text>
  <text x="40" y="332" font-family="monospace" font-size="12" fill="#585b70">&#x251C;&#x2500;&#x2500;</text>
  <text x="76" y="332" font-family="monospace" font-size="12" fill="#89b4fa">public/</text>
  <text x="40" y="350" font-family="monospace" font-size="12" fill="#585b70">&#x251C;&#x2500;&#x2500;</text>
  <text x="76" y="350" font-family="monospace" font-size="12" fill="#a6e3a1">package.json</text>
  <text x="40" y="368" font-family="monospace" font-size="12" fill="#585b70">&#x2514;&#x2500;&#x2500;</text>
  <text x="76" y="368" font-family="monospace" font-size="12" fill="#a6e3a1">next.config.js</text>
  <!-- Success message -->
  <text x="24" y="396" font-family="monospace" font-size="13" fill="#a6e3a1">&#x2713;</text>
  <text x="44" y="396" font-family="monospace" font-size="13" font-weight="bold" fill="#a6e3a1">Portfolio created successfully!</text>
  <!-- Final prompt -->
  <text x="24" y="424" font-family="monospace" font-size="13" fill="#a6e3a1">~/projects/my-portfolio $</text>
  <text x="260" y="424" font-family="monospace" font-size="13" fill="#cdd6f4">npm run dev</text>
  <!-- Blinking cursor -->
  <rect x="360" y="412" width="8" height="16" fill="#cdd6f4" opacity="0.7"/>
</svg>