<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450">
  <defs>
    <filter id="shadow2" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>
  <!-- Browser chrome -->
  <rect width="800" height="450" rx="10" fill="#ffffff"/>
  <rect width="800" height="36" rx="10" fill="#e5e7eb"/>
  <rect x="0" y="20" width="800" height="16" fill="#e5e7eb"/>
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <rect x="120" y="10" width="560" height="16" rx="8" fill="#ffffff"/>
  <rect x="135" y="15" width="160" height="6" rx="3" fill="#d1d5db"/>
  <!-- Breadcrumb -->
  <rect x="40" y="50" width="60" height="8" rx="3" fill="#9ca3af"/>
  <text x="108" y="58" font-family="system-ui" font-size="11" fill="#d1d5db">/</text>
  <rect x="118" y="50" width="80" height="8" rx="3" fill="#9ca3af"/>
  <text x="206" y="58" font-family="system-ui" font-size="11" fill="#d1d5db">/</text>
  <rect x="216" y="50" width="100" height="8" rx="3" fill="#6366f1"/>
  <!-- Left: Product image -->
  <rect x="40" y="72" width="360" height="340" rx="10" fill="#ede9fe" filter="url(#shadow2)"/>
  <rect x="80" y="112" width="280" height="220" rx="8" fill="#c4b5fd"/>
  <rect x="160" y="180" width="120" height="80" rx="6" fill="#a78bfa"/>
  <!-- Thumbnail row -->
  <rect x="80" y="348" width="56" height="50" rx="6" fill="#c4b5fd" stroke="#6366f1" stroke-width="2"/>
  <rect x="146" y="348" width="56" height="50" rx="6" fill="#ddd6fe"/>
  <rect x="212" y="348" width="56" height="50" rx="6" fill="#ddd6fe"/>
  <rect x="278" y="348" width="56" height="50" rx="6" fill="#ddd6fe"/>
  <!-- Right: Product info -->
  <rect x="420" y="72" width="260" height="14" rx="4" fill="#1f2937"/>
  <rect x="420" y="94" width="180" height="10" rx="3" fill="#6b7280"/>
  <!-- Stars -->
  <circle cx="428" cy="122" r="6" fill="#fbbf24"/>
  <circle cx="444" cy="122" r="6" fill="#fbbf24"/>
  <circle cx="460" cy="122" r="6" fill="#fbbf24"/>
  <circle cx="476" cy="122" r="6" fill="#fbbf24"/>
  <circle cx="492" cy="122" r="6" fill="#e5e7eb"/>
  <text x="508" y="126" font-family="system-ui" font-size="11" fill="#9ca3af">(128 reviews)</text>
  <!-- Price -->
  <text x="420" y="156" font-family="system-ui" font-size="24" font-weight="700" fill="#6366f1">$129.99</text>
  <text x="540" y="156" font-family="system-ui" font-size="14" fill="#d1d5db" text-decoration="line-through">$179.99</text>
  <!-- Divider -->
  <line x1="420" y1="170" x2="760" y2="170" stroke="#e5e7eb" stroke-width="1"/>
  <!-- Size selector -->
  <text x="420" y="192" font-family="system-ui" font-size="12" font-weight="600" fill="#374151">Size</text>
  <rect x="420" y="200" width="40" height="30" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="432" y="220" font-family="system-ui" font-size="11" fill="#6b7280">S</text>
  <rect x="468" y="200" width="40" height="30" rx="6" fill="#6366f1"/>
  <text x="480" y="220" font-family="system-ui" font-size="11" fill="#ffffff">M</text>
  <rect x="516" y="200" width="40" height="30" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="528" y="220" font-family="system-ui" font-size="11" fill="#6b7280">L</text>
  <rect x="564" y="200" width="40" height="30" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="573" y="220" font-family="system-ui" font-size="11" fill="#6b7280">XL</text>
  <!-- Quantity selector -->
  <text x="420" y="256" font-family="system-ui" font-size="12" font-weight="600" fill="#374151">Quantity</text>
  <rect x="420" y="264" width="120" height="34" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="438" y="286" font-family="system-ui" font-size="16" fill="#6b7280">-</text>
  <text x="474" y="286" font-family="system-ui" font-size="14" font-weight="600" fill="#1f2937">1</text>
  <text x="518" y="286" font-family="system-ui" font-size="16" fill="#6b7280">+</text>
  <!-- Add to Cart button -->
  <rect x="420" y="312" width="200" height="42" rx="8" fill="#6366f1"/>
  <text x="478" y="338" font-family="system-ui" font-size="14" font-weight="600" fill="#ffffff">Add to Cart</text>
  <!-- Wishlist button -->
  <rect x="632" y="312" width="42" height="42" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="644" y="340" font-family="system-ui" font-size="18" fill="#ef4444">&#x2665;</text>
  <!-- Reviews section -->
  <line x1="420" y1="368" x2="760" y2="368" stroke="#e5e7eb" stroke-width="1"/>
  <text x="420" y="390" font-family="system-ui" font-size="13" font-weight="600" fill="#374151">Customer Reviews</text>
  <!-- Review 1 -->
  <circle cx="432" cy="414" r="12" fill="#dbeafe"/>
  <rect x="452" y="406" width="100" height="8" rx="3" fill="#374151"/>
  <rect x="452" y="420" width="200" height="6" rx="3" fill="#9ca3af"/>
  <circle cx="566" cy="410" r="4" fill="#fbbf24"/>
  <circle cx="578" cy="410" r="4" fill="#fbbf24"/>
  <circle cx="590" cy="410" r="4" fill="#fbbf24"/>
  <circle cx="602" cy="410" r="4" fill="#fbbf24"/>
  <circle cx="614" cy="410" r="4" fill="#fbbf24"/>
</svg>